<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quiz</title>
  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin: 24px auto;
      padding: 0 24px;
      max-width: 980px;
      background: #fff;
      color: #111;
    }

    h1 {
      text-align: center;
      margin-bottom: 8px;
    }

    .intro-steps {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 0 18px;
      text-align: center;
    }

    .intro-arrow {
      color: #999;
    }

    .card {
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 16px;
      margin: 12px 0;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid #ccc;
      background: #fff;
      cursor: pointer;
    }

    button.primary {
      background: #2563eb;
      border-color: #2563eb;
      color: white;
    }

    button.secondary {
      background: #f8f8f8;
    }

    button.warn {
      background: #fff7ed;
      border-color: #fdba74;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .muted {
      color: #666;
      font-size: 14px;
    }

    .status {
      padding: 10px;
      border-radius: 10px;
      background: #f5f5f5;
    }

    .qtitle {
      font-size: 24px;
      font-weight: 650;
      margin: 0 0 14px;
      line-height: 1.4;
    }

    .opt {
      margin: 10px 0;
    }

    .answer-option {
      display: flex;
      align-items: center;
      gap: 10px;
      line-height: 1.35;
    }

    .answer-letter {
      min-width: 28px;
      font-weight: 650;
    }

    .answer-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: inline-block;
      flex: 0 0 18px;
      border: 1px solid rgba(0, 0, 0, 0.18);
    }

    .answer-dot-blue {
      background: #2563eb;
    }

    .answer-dot-green {
      background: #16a34a;
    }

    .answer-dot-red {
      background: #dc2626;
    }

    .correct-marker {
      font-weight: 650;
    }

    .correct-answer-line {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .ok {
      color: #0a7a2f;
      font-weight: 600;
    }

    .bad {
      color: #b42318;
      font-weight: 600;
    }

    input[type="number"] {
      width: 110px;
      padding: 8px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    input[type="text"] {
      padding: 8px;
      border-radius: 10px;
      border: 1px solid #ccc;
      width: 100%;
      max-width: 420px;
    }

    select {
      padding: 8px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    .nav-row {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .progress {
      font-size: 14px;
      color: #666;
    }

    .answer-box {
      margin-top: 14px;
      min-height: 24px;
    }

    .score-box {
      font-size: 18px;
      font-weight: 600;
    }

    .feedback {
      margin-top: 14px;
      padding: 12px;
      border-radius: 10px;
      background: #f7f7f7;
    }

    .candidate-card.selected {
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.08);
    }

    .pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: #f3f4f6;
      font-size: 12px;
      color: #444;
    }

    .notice-box {
      margin-top: 12px;
      color: #666;
      font-size: 14px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <h1>Quiz</h1>
  <p class="muted intro-steps">
    <span>Upload en PDF</span>
    <span class="intro-arrow">→</span>
    <span>Generer forslag</span>
    <span class="intro-arrow">→</span>
    <span>Vælg spørgsmål</span>
    <span class="intro-arrow">→</span>
    <span>Start quizzen</span>
  </p>

  <div class="card">
    <div class="row">
      <input id="file" type="file" accept="application/pdf" />
      <button id="uploadBtn" class="primary">Upload</button>
      <span id="uploadInfo" class="muted"></span>
    </div>

    <hr style="border:none;border-top:1px solid #eee;margin:14px 0;" />

    <div class="row">
      <label>Hold:
        <select id="ageGroup">
          <option value="A">A (6 - 8 år)</option>
          <option value="B" selected>B (9 - 12 år)</option>
          <option value="C">C (13 - 15 år)</option>
          <option value="UNG">Ungdom (16 - 18 år)</option>
        </select>
      </label>

      <label>Antal spørgsmål:
        <input id="numq" type="number" value="8" min="3" max="30" />
      </label>

      <label>Fra side:
        <input id="pageFrom" type="number" min="1" placeholder="1" />
      </label>

      <label>Til side:
        <input id="pageTo" type="number" min="1" placeholder="20" />
      </label>
    </div>

    <div class="row" style="margin-top:12px;">
      <button id="genBtn" class="primary" disabled>Generer forslag</button>
    </div>

    <div style="margin-top:12px" class="status" id="status">Status: klar</div>
  </div>

  <div id="review"></div>
  <div id="quiz"></div>

  <script>
    const API = "";
    let uploadId = null;
    let requestedQuestionCount = 8;

    let generationContext = {
      age_group: "B",
      page_from: null,
      page_to: null
    };

    let candidateQuiz = null;
    let selectedQuestionIds = new Set();

    let currentQuiz = null;
    let currentIndex = 0;
    let answers = {};
    let checkedQuestions = {};

    const el = (id) => document.getElementById(id);

    function setStatus(msg) {
      el("status").textContent = "Status: " + msg;
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function clearViews() {
      el("review").innerHTML = "";
      el("quiz").innerHTML = "";
    }

    function usesColorAnswers() {
      return generationContext.age_group === "A";
    }

    function answerMarkerText(index) {
      if (usesColorAnswers()) {
        return ["Blå prik", "Grøn prik", "Rød prik"][index] || "";
      }
      return ["A)", "B)", "C)"][index] || "";
    }

    function answerMarkerHtml(index) {
      if (usesColorAnswers()) {
        const colors = [
          { name: "Blå", className: "answer-dot-blue" },
          { name: "Grøn", className: "answer-dot-green" },
          { name: "Rød", className: "answer-dot-red" }
        ];
        const color = colors[index] || colors[0];
        return `<span class="answer-dot ${color.className}" title="${color.name} prik" aria-label="${color.name} prik"></span>`;
      }
      return `<span class="answer-letter">${answerMarkerText(index)}</span>`;
    }

    function correctAnswerHtml(q) {
      const correct = (q.options || [])[q.answer_index] || "";
      return `
        <span class="correct-answer-line">
          ${answerMarkerHtml(q.answer_index)}
          <span>${escapeHtml(correct)}</span>
        </span>
      `;
    }

    el("uploadBtn").addEventListener("click", async () => {
      const file = el("file").files[0];
      if (!file) {
        alert("Vælg en PDF først.");
        return;
      }

      setStatus("Uploader PDF...");
      el("uploadBtn").disabled = true;

      try {
        const formData = new FormData();
        formData.append("file", file);

        const res = await fetch(API + "/upload", {
          method: "POST",
          body: formData
        });

        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.detail || "Upload fejlede");
        }

        uploadId = data.upload_id;
        el("uploadInfo").textContent =
          `Uploadet: ${data.filename} (${Math.round(data.bytes / 1024)} KB)`;

        el("genBtn").disabled = false;
        setStatus("Upload ok. Klar til at generere forslag.");
        } catch (err) {
        console.error(err);
        alert("Fejl ved generering: " + err.message);
        setStatus("Fejl ved generering: " + err.message);
      } finally {
        el("uploadBtn").disabled = false;
      }
    });

    el("genBtn").addEventListener("click", async () => {
      if (!uploadId) {
        alert("Upload en PDF først.");
        return;
      }

      const pageFromVal = el("pageFrom").value ? Number(el("pageFrom").value) : null;
      const pageToVal = el("pageTo").value ? Number(el("pageTo").value) : null;
      requestedQuestionCount = Number(el("numq").value);

      generationContext = {
        age_group: el("ageGroup").value,
        page_from: pageFromVal,
        page_to: pageToVal
      };

      const payload = {
        upload_id: uploadId,
        num_questions: requestedQuestionCount,
        age_group: generationContext.age_group,
        page_from: generationContext.page_from,
        page_to: generationContext.page_to
      };

      setStatus("Genererer forslag...");
      el("genBtn").disabled = true;
      clearViews();

      try {
        const res = await fetch(API + "/generate_candidates", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.detail || "Generering fejlede");
        }

        candidateQuiz = data.quiz;
        selectedQuestionIds = new Set();

        const pageRange = data.debug?.page_range ?? "-";

        setStatus(`Forslag genereret. Sider: ${pageRange}.`);
        renderReview(candidateQuiz);
      } catch (err) {
        console.error(err);
        alert(err.message);
        setStatus("Fejl ved generering.");
      } finally {
        el("genBtn").disabled = false;
      }
    });

    function renderReview(quiz) {
      const root = el("review");
      root.innerHTML = "";

      if (!quiz || !quiz.questions || quiz.questions.length === 0) {
        root.innerHTML = `<div class="card">Ingen forslag fundet.</div>`;
        return;
      }

      const wrapper = document.createElement("div");
      wrapper.className = "card";
      const reviewNotice = quiz.questions.length < requestedQuestionCount
        ? `Der kunne kun genereres ${quiz.questions.length} ud af ${requestedQuestionCount} ønskede spørgsmål baseret på det indtastede sideinterval.`
        : `Der vises ${quiz.questions.length} ud af ${requestedQuestionCount} ønskede spørgsmål.`;
      wrapper.innerHTML = `
        <h2 style="margin-top:0">Vælg spørgsmål</h2>
        <p class="muted">
          Vælg de spørgsmål, du vil have med i quizzen.
        </p>
        <div class="notice-box">${escapeHtml(reviewNotice)}</div>
        <div class="row" style="margin-top:12px;">
          <label>Quiztitel:
            <input id="quizTitleInput" type="text" value="Valgt quiz" />
          </label>
        </div>
        <div style="margin-top:12px;">
          <span class="pill" id="selectedCountPill">Valgt: 0 / maks. ${requestedQuestionCount}</span>
        </div>
        <div id="candidateList" style="margin-top:16px;"></div>
        <div class="row" style="margin-top:18px;">
          <button id="finalizeBtn" class="primary" disabled>Start quiz med valgte spørgsmål</button>
        </div>
      `;
      root.appendChild(wrapper);

      const list = document.getElementById("candidateList");

      quiz.questions.forEach((q) => {
        const card = document.createElement("div");
        card.className = "card candidate-card";
        card.id = `candidate_${q.id}`;

        card.innerHTML = `
          <div class="row" style="justify-content:space-between;align-items:flex-start;">
            <div style="flex:1 1 600px;">
              <p style="margin:0 0 10px;font-weight:650;">${escapeHtml(q.question)}</p>

              ${(q.options || []).map((opt, idx) => `
                <div class="opt answer-option">
                  ${answerMarkerHtml(idx)}
                  <span>${escapeHtml(opt)}</span>
                </div>
              `).join("")}
              <div style="margin-top:10px;"><b>Korrekt svar:</b> ${correctAnswerHtml(q)}</div>
            </div>
            <div style="min-width:220px; display:flex; flex-direction:column; gap:8px;">
              <button class="primary select-btn" data-id="${q.id}">Vælg</button>
            </div>
          </div>
        `;
        list.appendChild(card);
      });

      document.querySelectorAll(".select-btn").forEach((btn) => {
        btn.addEventListener("click", () => toggleSelectQuestion(Number(btn.dataset.id)));
      });

      document.getElementById("finalizeBtn").addEventListener("click", finalizeSelectedQuiz);
      updateSelectionUI();
    }

    function toggleSelectQuestion(questionId) {
      if (selectedQuestionIds.has(questionId)) {
        selectedQuestionIds.delete(questionId);
      } else {
        if (selectedQuestionIds.size >= requestedQuestionCount) {
          alert(`Du kan vælge maks. ${requestedQuestionCount} spørgsmål.`);
          return;
        }
        selectedQuestionIds.add(questionId);
      }
      updateSelectionUI();
    }

    function updateSelectionUI() {
      const pill = document.getElementById("selectedCountPill");
      if (pill) {
        pill.textContent = `Valgt: ${selectedQuestionIds.size} / maks. ${requestedQuestionCount}`;
      }

      (candidateQuiz?.questions || []).forEach((q) => {
        const card = document.getElementById(`candidate_${q.id}`);
        const btn = card?.querySelector(".select-btn");

        if (!card || !btn) return;

        if (selectedQuestionIds.has(q.id)) {
          card.classList.add("selected");
          btn.textContent = "Fravælg";
        } else {
          card.classList.remove("selected");
          btn.textContent = "Vælg";
        }
      });

      const finalizeBtn = document.getElementById("finalizeBtn");
      if (finalizeBtn) {
        finalizeBtn.disabled = selectedQuestionIds.size < 1;
      }
    }

    async function finalizeSelectedQuiz() {
      const selectedQuestions = (candidateQuiz?.questions || []).filter((q) => selectedQuestionIds.has(q.id));

      if (selectedQuestions.length < 1) {
        alert("Vælg mindst ét spørgsmål.");
        return;
      }

      if (selectedQuestions.length > requestedQuestionCount) {
        alert(`Vælg maks. ${requestedQuestionCount} spørgsmål.`);
        return;
      }

      const quizTitle = document.getElementById("quizTitleInput")?.value?.trim() || "Valgt quiz";

      setStatus("Bygger den endelige quiz...");
      try {
        const res = await fetch(API + "/finalize_quiz", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            quiz_title: quizTitle,
            selected_questions: selectedQuestions
          })
        });

        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.detail || "Kunne ikke bygge quiz");
        }

        currentQuiz = data.quiz;
        currentIndex = 0;
        answers = {};
        checkedQuestions = {};

        el("review").innerHTML = "";
        setStatus("Quiz klar!");
        renderCurrentQuestion();
      } catch (err) {
        console.error(err);
        alert(err.message);
        setStatus("Fejl ved opbygning af quiz.");
      }
    }

    function saveCurrentAnswer() {
      if (!currentQuiz) return;
      const q = currentQuiz.questions[currentIndex];
      if (!q) return;

      const chosen = document.querySelector(`input[name="q_${q.id}"]:checked`);
      answers[q.id] = chosen ? Number(chosen.value) : null;
    }

    function isCorrect(q, given) {
      return given === q.answer_index;
    }

    function getAnswerFeedbackHtml(q) {
      const given = answers[q.id];

      if (given === null || given === undefined) {
        return `<span class="bad">Vælg et svar først.</span>`;
      }

      if (isCorrect(q, given)) {
        return `
          <div class="feedback">
            <div class="ok">Korrekt</div>
            <div style="margin-top:6px;"><b>Korrekt svar:</b> ${correctAnswerHtml(q)}</div>
            <div class="muted" style="margin-top:6px;">${escapeHtml(q.explanation || "—")}</div>
          </div>
        `;
      }

      return `
        <div class="feedback">
          <div class="bad">Ikke helt rigtigt</div>
          <div style="margin-top:6px;"><b>Korrekt svar:</b> ${correctAnswerHtml(q)}</div>
          <div class="muted" style="margin-top:6px;">${escapeHtml(q.explanation || "—")}</div>
        </div>
      `;
    }

    function renderCurrentQuestion() {
      const root = el("quiz");
      root.innerHTML = "";

      if (!currentQuiz || !currentQuiz.questions || currentQuiz.questions.length === 0) {
        root.innerHTML = `<div class="card">Ingen spørgsmål fundet.</div>`;
        return;
      }

      const total = currentQuiz.questions.length;
      const q = currentQuiz.questions[currentIndex];
      const alreadyChecked = !!checkedQuestions[q.id];

      const card = document.createElement("div");
      card.className = "card";

      let html = `
        <h2 style="margin-top:0">${escapeHtml(currentQuiz.quiz_title || "Quiz")}</h2>
        <div class="progress">Spørgsmål ${currentIndex + 1} af ${total}</div>
        <hr style="border:none;border-top:1px solid #eee;margin:14px 0;" />
        <p class="qtitle">${escapeHtml(q.question)}</p>
      `;

      html += (q.options || []).map((opt, idx) => {
        const checked = answers[q.id] === idx ? "checked" : "";
        const disabled = alreadyChecked ? "disabled" : "";
        return `
          <div class="opt">
            <label class="answer-option">
              <input type="radio" name="q_${q.id}" value="${idx}" ${checked} ${disabled} />
              ${answerMarkerHtml(idx)}
              <span>${escapeHtml(opt)}</span>
            </label>
          </div>
        `;
      }).join("");

      html += `<div class="answer-box" id="feedbackBox">`;
      if (alreadyChecked) {
        html += getAnswerFeedbackHtml(q);
      }
      html += `</div>`;

      html += `
        <div class="nav-row">
          <div>
            <button id="prevBtn" ${currentIndex === 0 ? "disabled" : ""}>Forrige</button>
            ${alreadyChecked ? "" : `<button id="checkBtn" class="primary">Tjek svar</button>`}
            <button id="nextBtn">${currentIndex === total - 1 ? "Se resultat" : "Næste"}</button>
          </div>
        </div>
      `;

      card.innerHTML = html;
      root.appendChild(card);

      el("prevBtn").addEventListener("click", () => {
        saveCurrentAnswer();
        if (currentIndex > 0) {
          currentIndex -= 1;
          renderCurrentQuestion();
        }
      });

      const checkBtn = document.getElementById("checkBtn");
      if (checkBtn) {
        checkBtn.addEventListener("click", () => {
          saveCurrentAnswer();

          const feedbackBox = document.getElementById("feedbackBox");
          const given = answers[q.id];

          if (given === null || given === undefined) {
            feedbackBox.innerHTML = `<span class="bad">Vælg et svar først.</span>`;
            return;
          }

          checkedQuestions[q.id] = true;
          feedbackBox.innerHTML = getAnswerFeedbackHtml(q);
          renderCurrentQuestion();
        });
      }

      el("nextBtn").addEventListener("click", () => {
        saveCurrentAnswer();
        if (currentIndex < total - 1) {
          currentIndex += 1;
          renderCurrentQuestion();
        } else {
          renderResults();
        }
      });
    }

    function renderResults() {
      const root = el("quiz");
      root.innerHTML = "";

      let score = 0;
      const total = currentQuiz.questions.length;

      currentQuiz.questions.forEach((q) => {
        const given = answers[q.id];
        if (isCorrect(q, given)) {
          score += 1;
        }
      });

      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <h2 style="margin-top:0">Resultat</h2>
        <p class="score-box">Score: ${score}/${total}</p>
        <div class="nav-row">
          <button id="restartBtn">Se quiz igen</button>
          <button id="backToReviewBtn" class="secondary">Lav nye valg</button>
        </div>
      `;
      root.appendChild(card);

      el("restartBtn").addEventListener("click", () => {
        currentIndex = 0;
        renderCurrentQuestion();
      });

      el("backToReviewBtn").addEventListener("click", () => {
        answers = {};
        checkedQuestions = {};
        el("quiz").innerHTML = "";
        renderReview(candidateQuiz);
        setStatus("Vælg spørgsmål igen.");
      });
    }
  </script>
</body>
</html>
